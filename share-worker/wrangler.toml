name = "sourcecapsule-share"
main = "worker.mjs"
compatibility_date = "2026-07-01"

[[r2_buckets]]
binding = "CAPSULES"
bucket_name = "sourcecapsule-shares"
preview_bucket_name = "sourcecapsule-shares-dev"

[triggers]
crons = ["17 3 * * *"]

# Per-IP limit on creating new share links (POST /api/capsules).
# File uploads are not limited: they require the capsule's bearer token,
# and one capsule can legitimately upload ~40 media files in a burst.
[[ratelimits]]
name = "CREATE_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
